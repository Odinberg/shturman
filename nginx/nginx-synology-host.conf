# Nginx reverse proxy для Synology (работает НЕ в Docker)
# Пути на Synology: /etc/nginx/sites-enabled/shturman.conf
# Проксирует в Docker-контейнеры на localhost:{dev_port}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name vnutrenniy-kompas.ru www.vnutrenniy-kompas.ru;

    location /.well-known/acme-challenge/ {
        root /volume1/docker/shturman/nginx/ssl;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name vnutrenniy-kompas.ru www.vnutrenniy-kompas.ru;

    ssl_certificate     /volume1/docker/shturman/nginx/ssl/fullchain.pem;
    ssl_certificate_key /volume1/docker/shturman/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend (Next.js на порту 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # Backend API (FastAPI на порту 8000)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;

        # CORS для VK Mini App
        add_header Access-Control-Allow-Origin "https://vnutrenniy-kompas.ru" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }
}
