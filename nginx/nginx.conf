# Nginx reverse proxy for vnutrenniy-kompas.ru
# Frontend: http://frontend:3000
# Backend:  http://backend:8000

server {
    listen 80;
    server_name vnutrenniy-kompas.ru www.vnutrenniy-kompas.ru;

    # Redirect HTTP to HTTPS (uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    # Max upload size for journal entries
    client_max_body_size 10M;

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # CORS headers
        add_header Access-Control-Allow-Origin "https://vnutrenniy-kompas.ru" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # API docs (Swagger)
    location /api/docs {
        proxy_pass http://backend:8000/api/docs;
        proxy_set_header Host $host;
    }

    location /api/openapi.json {
        proxy_pass http://backend:8000/api/openapi.json;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }
}

