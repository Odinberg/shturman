# Nginx reverse proxy for vnutrenniy-kompas.ru
# Runs in Docker: docker-compose.prod.yml
# SSL certs: ./nginx/ssl/fullchain.pem + privkey.pem

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name vnutrenniy-kompas.ru www.vnutrenniy-kompas.ru;

    # LetsEncrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name vnutrenniy-kompas.ru www.vnutrenniy-kompas.ru;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://vk.com https://id.vk.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https://api.vk.com https://id.vk.com; frame-src https://vk.com https://id.vk.com;" always;

    # Favicon — serve directly, no proxy
    location = /favicon.ico {
        root /usr/share/nginx/html;
        try_files /favicon.ico =204;
        access_log off;
        log_not_found off;
    }

    # Next.js static assets — cache aggressively
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }

    # Custom 502/503 error page (inline JSON for API clients)
    location = /50x.html {
        default_type application/json;
        return 503 '{"error":"Service temporarily unavailable","status":503}';
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;

        add_header Access-Control-Allow-Origin "https://vnutrenniy-kompas.ru" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_error;
    }

    # Backend error fallback
    location @backend_error {
        default_type application/json;
        return 503 '{"error":"Backend temporarily unavailable","status":503}';
    }

    # API docs (Swagger)
    location /api/docs {
        proxy_pass http://backend:8000/api/docs;
        proxy_set_header Host $host;
    }

    location /api/openapi.json {
        proxy_pass http://backend:8000/api/openapi.json;
        proxy_set_header Host $host;
    }

    # Web images (Synology Web Station — /volume1/web_images)
    location /web_images/ {
        root /var/host-images;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health check
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }
}
