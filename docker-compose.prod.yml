# Production deployment on Synology NAS
# Domain: vnutrenniy-kompas.ru
# Internal: 192.168.0.72, External: 91.247.233.83

services:
  postgres:
    image: postgres:16-alpine
    container_name: shturman-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shturman
      POSTGRES_PASSWORD: ${DB_PASSWORD:-shturman_secret}
      POSTGRES_DB: shturman
    volumes:
      - shturman_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shturman"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shturman_net
    # No external port — only accessible within Docker network

  redis:
    image: redis:7-alpine
    container_name: shturman-redis
    restart: unless-stopped
    volumes:
      - shturman_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shturman_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shturman-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://shturman:${DB_PASSWORD:-shturman_secret}@postgres:5432/shturman
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shturman_net

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.prod
    container_name: shturman-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://vnutrenniy-kompas.ru/api
    depends_on:
      - backend
    networks:
      - shturman_net

  nginx:
    image: nginx:alpine
    container_name: shturman-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/www:/var/www/html:ro
    depends_on:
      - frontend
      - backend
    networks:
      - shturman_net

volumes:
  shturman_pgdata:
  shturman_redisdata:

networks:
  shturman_net:
    driver: bridge
