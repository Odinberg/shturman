services:
  postgres:
    image: postgres:16-alpine
    container_name: shturman-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shturman
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: shturman
    volumes:
      - shturman_pgdata:/var/lib/postgresql/data
    networks: [shturman_net]

  redis:
    image: redis:7-alpine
    container_name: shturman-redis
    restart: unless-stopped
    volumes:
      - shturman_redisdata:/data
    networks: [shturman_net]

  backend:
    build: ./backend
    container_name: shturman-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://shturman:${DB_PASSWORD}@postgres:5432/shturman
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      VK_APP_SECRET: ${VK_APP_SECRET}
      VK_WEB_CLIENT_SECRET: ${VK_WEB_CLIENT_SECRET}
      VK_SERVICE_TOKEN: ${VK_SERVICE_TOKEN}
      DEBUG: "false"
    ports:
      - "9091:8000"
    depends_on: [postgres, redis]
    networks: [shturman_net]

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.prod
    container_name: shturman-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://vnutrenniy-kompas.ru/api
    ports:
      - "9090:3000"
    depends_on: [backend]
    networks: [shturman_net]

volumes:
  shturman_pgdata:
  shturman_redisdata:

networks:
  shturman_net:
    driver: bridge
