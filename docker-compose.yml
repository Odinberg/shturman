services:
  postgres:
    image: postgres:16-alpine
    container_name: shturman-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shturman
      POSTGRES_PASSWORD: shturman_secret
      POSTGRES_DB: shturman
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shturman"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shturman-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shturman-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://shturman:shturman_secret@postgres:5432/shturman
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-shturman-jwt-secret-dev}
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: shturman-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    # Монтируем только src, public и конфиги — node_modules остаётся из образа
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src
      - ./apps/frontend/public:/app/apps/frontend/public
      - ./apps/frontend/next.config.js:/app/apps/frontend/next.config.js
      - ./apps/frontend/package.json:/app/apps/frontend/package.json
      - ./packages:/app/packages
      - ./nx.json:/app/nx.json
      - ./tsconfig.base.json:/app/tsconfig.base.json

volumes:
  pgdata:
  redisdata:
